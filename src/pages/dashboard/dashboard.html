<div class="dashboard-top-section">
    
    <!-- Left Section: Welcome Message -->
    <div class="welcome-block">
        <div class="welcome-text">
            <h1 class="welcome-heading">Welcome to Dashboard</h1>
           
        </div>
        <div class="welcome-vector">
            <!-- Replace with your dashboard laptop illustration asset -->
            <!-- <img src="assets/dashboard-illustration.png" alt="Illustration" class="vector-img"> -->
                        <svg-icon class="mr-5"  src="/avator.svg"></svg-icon>


            
        </div>
    </div>

    <!-- Right Section: 4 Status Cards Row -->
    <div class="metrics-row">
        
        <!-- Card 1: Accounts -->
        <div class="status-card">
            <div class="card-header">
                <span class="card-title">Accounts (200)</span>
                <div class="badge-icon accounts-bg"><i class="pi pi-home"></i></div>
            </div>
            <div class="card-value">
                <span class="currency">SAR</span>
                <span class="amount">19,845,343</span>
                <span class="decimals">.00</span>
            </div>
            <div class="card-footer">
                <span class="indicator active-dot"><span></span> Active 150</span>
                <span class="indicator inactive-dot"><span></span> Inactive 20</span>
                <span class="indicator dormant-dot"><span></span> Dormant 0</span>
            </div>
        </div>

        <!-- Card 2: Deposits -->
        <div class="status-card">
            <div class="card-header">
                <span class="card-title">Deposits (350)</span>
                <div class="badge-icon deposits-bg"><i class="pi pi-dollar"></i></div>
            </div>
            <div class="card-value">
                <span class="currency">SAR</span>
                <span class="amount">34,324,853</span>
                <span class="decimals">.00</span>
            </div>
            <div class="card-footer">
                <span class="indicator active-dot"><span></span> Active 310</span>
                <span class="indicator inactive-dot"><span></span> Inactive 40</span>
                <span class="indicator dormant-dot"><span></span> Dormant 0</span>
            </div>
        </div>

        <!-- Card 3: Cards -->
        <div class="status-card">
            <div class="card-header">
                <span class="card-title">Cards (500)</span>
                <div class="badge-icon cards-bg"><i class="pi pi-credit-card"></i></div>
            </div>
            <div class="card-value">
                <span class="currency">SAR</span>
                <span class="amount">53,423,423</span>
                <span class="decimals">.00</span>
            </div>
            <div class="card-footer">
                <span class="indicator active-dot"><span></span> Active 420</span>
                <span class="indicator inactive-dot"><span></span> Inactive 80</span>
                <span class="indicator dormant-dot"><span></span> Dormant 0</span>
            </div>
        </div>

        <!-- Card 4: Loans -->
        <div class="status-card">
            <div class="card-header">
                <span class="card-title">Loans (150)</span>
                <div class="badge-icon loans-bg"><i class="pi pi-file"></i></div>
            </div>
            <div class="card-value">
                <span class="currency">SAR</span>
                <span class="amount">83,463,343</span>
                <span class="decimals">.00</span>
            </div>
            <div class="card-footer">
                <span class="indicator active-dot"><span></span> Active 120</span>
                <span class="indicator inactive-dot"><span></span> Inactive 25</span>
                <span class="indicator dormant-dot"><span></span> Dormant 5</span>
            </div>
        </div>

    </div>
</div>
